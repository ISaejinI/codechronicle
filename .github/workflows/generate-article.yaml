name: Generate Article

on:
    push:
        branches:
            - main

jobs:
    generate-article:
        runs-on: ubuntu-latest
        steps:
            - name: Clone GitHub Repo
              uses: actions/checkout@v4

            - name: Find blank article file
              run: |
                cd blog
                FILE="$(find . -type f -empty -print -quit)"
                FILE="${FILE#./}"
                echo "FILE=$FILE" >> $GITHUB_ENV
                echo "Blank article file: $FILE"

            - name: Check if file name is valid
              run: |
                if ! echo "$FILE" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}-[a-z0-9]+(-[a-z0-9]+)*\.md$'; then
                    echo "Nom de fichier invalide : $FILE"
                    echo "Format attendu : YYYY-MM-DD-nom-de-l-article.md"
                    exit 1
                else
                    echo "Nom de fichier valide : $FILE"
                fi

            - name: Set up Node.js
              uses: actions/setup-node@v1
              with:
                node-version: 16
            
            - name: OpenAI link
              uses: Just-Moh-it/openai@v0.0.1
              with:
                openai-api-key: ${{ secrets.OPENAI_API_KEY }}
                openai-mode: "completion"
                openai-params: >-
                    {
                        "prompt": "Tu es rédacteur technique. Génère un article de blog en Markdown à partir du nom de fichier suivant : ${FILE}. Le fichier suit le format YYYY-MM-DD-slug.md. Déduis le sujet depuis le slug. Réponds uniquement avec le contenu Markdown final, sans explication. Le fichier doit commencer par un frontmatter YAML contenant exactement : title, summary, tags. tags doit être une liste YAML. Ensuite, écris un article clair en français avec une introduction, plusieurs sections avec titres Markdown, des exemples concrets, et une conclusion. Sujet : ${FILE}",
                        "model": "gpt-4o-mini",
                        "max_tokens": 1500
                    }
              id: openai

            - name: Print
              run: |
                echo  "${{ steps.openai.outputs.completion }}"
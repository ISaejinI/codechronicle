name: Implement Article

on:
    workflow_dispatch:

    push:
        branches:
            - main
        paths:
            - 'blog/**'

permissions:
  contents: write

jobs:
    implement-article:
        runs-on: ubuntu-latest
        steps:
            - name: Clone GitHub Repo
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Find merged article file
              run: |
                if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
                  FILE="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'blog/*.md' | head -n 1)"
                else
                  FILE="$(git log -1 --name-only --pretty="" -- 'blog/*.md' | head -n 1)"
                fi

                FILE="${FILE#blog/}"

                if [ -z "$FILE" ]; then
                  echo "Impossible de retrouver l'article Markdown généré."
                  exit 1
                fi

                echo "FILE=$FILE" >> $GITHUB_ENV
                echo "Merged article file: $FILE"

            - name: Get Article Title & Summary
              id: get_title_summary
              run: |
                TITLE=$(grep '^title:' "blog/${{ env.FILE }}" | sed 's/title: "\(.*\)"/\1/')
                SUMMARY=$(grep '^summary:' "blog/${{ env.FILE }}" | sed 's/summary: "\(.*\)"/\1/')
                echo "TITLE=$TITLE" >> $GITHUB_ENV
                echo "SUMMARY=$SUMMARY" >> $GITHUB_ENV

            - name: Set up Node.js
              uses: actions/setup-node@v1
              with:
                node-version: 26

            - name: Install dependencies
              run: npm i @wcj/markdown-to-html

            - name: Get article content
              id: get_article_content
              run: |
                CONTENT=$(cat "blog/${{ env.FILE }}")
                echo "CONTENT<<EOF" >> $GITHUB_ENV
                echo "$CONTENT" >> $GITHUB_ENV
                echo "EOF" >> $GITHUB_ENV
            
            - name: Create HTML file
              run: |
                FILE_NAME=$(basename "${{ env.FILE }}" .md)
                echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
                echo "Creating HTML file: public/blog/${FILE_NAME}.html"
                touch "./public/blog/${FILE_NAME}.html"
                                  
            - name: Convert article to HTML
              run: node ./scripts/convert-to-html.js

            - name: Generate index.html
              run: node ./scripts/generate-index.js

            - name: Commit and push changes
              run: |
                git config --global user.name "OtterBot"
                git config --global user.email "github-actions[bot]@users.noreply.github.com"
                git add public/
                git commit -m "Generate HTML article: ${{ env.FILE_NAME }}.html and index.html"
                git push
            
            - name: Send Discord Message
              env:
                DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
              uses: Ilshidur/action-discord@0.4.0
              with:
                args: |
                    >>> # Nouvel article généré ! 
                    **${{ env.TITLE }}**
                    ${{ env.SUMMARY }}
                    [Lire l'article complet](https://blogdebot.infinityfreeapp.com/blog/${{ env.FILE }})
                    -# L’article a été généré automatiquement. Merci de le relire avant de merger cette Pull Request.

            - name: Publish public folder to InfinityFree
              uses: SamKirkland/FTP-Deploy-Action@4.1.0
              with:
                server: ${{ secrets.FTP_HOSTNAME }}
                username: ${{ secrets.FTP_USERNAME }}
                password: ${{ secrets.FTP_PASSWORD }}
                local-dir: ./public/
                server-dir: /htdocs/
